<!-- TopNavBar -->
<header class="docked full-width top-0 sticky backdrop-blur-md bg-opacity-90 shadow-sm z-50 bg-transparent">
<div class="flex justify-between items-center w-full px-margin-desktop py-4 max-w-container-max mx-auto ease-out duration-300">

<img class="w-full h-full object-cover" data-alt="A sophisticated close-up portrait of a chic individual set against a soft, minimalist studio backdrop. The lighting is high-key and flattering, emphasizing a modern luxury aesthetic with a clean white and deep navy color palette. The mood is confident, elegant, and perfectly aligned with a high-end concierge service identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqrBMkFwqBhChuomdgZwBLwJqMMarQfGjdmqdG3HtnLREbsufW1_LHl9C97qRltOiV2Sr2pe7BFi2ynBKb8-5UGkvaHmN5O_K-7xZV920OvJqpqXVIeuQnupSZWrE-1EQ5el7_ZTWvgRi63_Odisp4pkQKfzAKfoOs7_R-l5nmCaY3_Gl2Vw0jjOXDN_0HhFIwq6ry5rgbVzMnH5dMJdORFoDhG1tUPSv8Ixl81HZmHc28y1FrlQADTysrhsQbRikN4e7lEv6t2ug"/>

<p class="font-body-md text-on-surface-variant mb-8">eleanor.vance@example.com</p>
<button class="w-full border border-secondary text-secondary hover:bg-secondary hover:text-on-secondary transition-colors duration-300 rounded-full px-6 py-3 font-body-md font-semibold tracking-wide">
                    Edit Profile

</div>

<div class="grid grid-cols-2 gap-unit">
<div class="col-span-2 bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/30 flex justify-between items-center hover:-translate-y-1 transition-transform duration-300">
<div>
<p class="font-label-caps text-on-surface-variant uppercase tracking-widest mb-1">Total Bookings</p>
<p class="font-headline-lg text-headline-lg text-primary">12</p>
</div>
<span class="material-symbols-outlined text-secondary text-4xl opacity-50" data-icon="luggage">luggage</span>
</div>
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/30 hover:-translate-y-1 transition-transform duration-300">
<p class="font-label-caps text-on-surface-variant uppercase tracking-widest mb-1">Reviews</p>
<p class="font-headline-lg text-headline-lg text-primary">8</p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/30 hover:-translate-y-1 transition-transform duration-300">

<div class="grid grid-cols-1 md:grid-cols-2 gap-x-gutter gap-y-10">
<!-- First Name -->

<label class="font-label-caps text-on-surface-variant uppercase tracking-widest block mb-2">First Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant px-0 py-2 font-body-lg text-on-surface focus:ring-0 focus:border-secondary transition-colors placeholder-on-surface-variant/50" placeholder="Enter first name" type="text" value="Eleanor"/>
</div>
<!-- Last Name -->
<div class="relative">
<label class="font-label-caps text-on-surface-variant uppercase tracking-widest block mb-2">Last Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant px-0 py-2 font-body-lg text-on-surface focus:ring-0 focus:border-secondary transition-colors placeholder-on-surface-variant/50" placeholder="Enter last name" type="text" value="Vance"/>
</div>
<!-- Email -->

</div>

</div>
</div>
<div class="pt-8 flex justify-end">
<button class="bg-primary text-on-primary hover:-translate-y-1 hover:shadow-lg shadow-black/10 transition-all duration-300 rounded-full px-10 py-4 font-body-md font-semibold tracking-wide flex items-center gap-2" type="button">

                        </button>
</div>
