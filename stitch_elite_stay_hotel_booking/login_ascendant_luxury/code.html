<body class="bg-surface-container-lowest text-on-surface h-screen flex overflow-hidden">
<!-- Left Side: Image Canvas -->
<div class="hidden lg:flex lg:w-1/2 relative bg-primary-container items-center justify-center">
<!-- Background Image -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="A highly detailed, wide-angle shot of a luxurious, modern hotel lobby bathed in warm, ambient lighting. The space features sweeping architectural curves, soaring high ceilings, and rich textures of dark marble and polished gold accents. Soft, dramatic shadows emphasize depth and elegance, perfectly aligning with a premium, exclusive hospitality brand aesthetic. The scene feels quiet, sophisticated, and inviting." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDKBegyy60_trtcH2gY3PKGM91jWln6MHr53cCwwWjpEyjfxyG3VgIx6I2uYp09kYR0YvEj-jMCZQeau3Xu8HMTDFIJUbBJvJN5ZF_T0zRsNYI_j9JY9GeEqUZxa8p5mz0fJtgnmlvcdwtfAZTkv4_Rky_qI2gCIZhgyXOdKCGALgOQArnUGoZwH5TzUPYqZZX81gzF4tFcbSbdiGOEo3PU5G6fMy0d3aYX-k9r_MZIZKDSoY8upQXKV5wYyb7mbea0xm--_B6poFA');"></div>
<!-- Overlay -->
<div class="absolute inset-0 bg-primary-container/40 mix-blend-multiply"></div>
<div class="absolute inset-0 bg-gradient-to-t from-primary-container/80 via-transparent to-transparent"></div>
<!-- Quote -->
<div class="relative z-10 px-margin-desktop text-center max-w-2xl">
<h2 class="font-display-lg text-display-lg text-secondary-fixed-dim mb-6 drop-shadow-lg">"Exclusivity is not just a destination; it is an experience meticulously crafted."</h2>
<div class="w-16 h-[2px] bg-secondary-fixed-dim mx-auto mb-4"></div>
<p class="font-body-lg text-body-lg text-on-primary opacity-90 tracking-wide uppercase">Ascendant Luxury Concerige</p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center bg-surface-container-lowest px-margin-mobile md:px-margin-desktop overflow-y-auto">
<div class="w-full max-w-md py-12">
<!-- Brand Identity -->
<div class="mb-12 text-center lg:text-left">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight mb-2">Ascendant Luxury</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Welcome back. Please enter your credentials to access your private portal.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Input -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2 uppercase" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-secondary focus:ring-0 px-4 py-3 font-body-md text-body-md text-on-surface transition-colors duration-300" id="email" name="email" placeholder="concierge@ascendant.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-body-md text-body-md text-secondary hover:text-on-secondary-container transition-colors duration-300 text-sm" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-secondary focus:ring-0 px-4 py-3 font-body-md text-body-md text-on-surface transition-colors duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-secondary transition-colors duration-300" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-secondary focus:ring-secondary bg-surface-container-low" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                        Remember me on this device
                    </label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex justify-center py-4 px-4 bg-primary-container text-on-primary font-body-lg text-body-lg hover:-translate-y-1 hover:shadow-lg shadow-sm transition-all duration-300 ease-out rounded-DEFAULT" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Sign Up Link -->
<div class="mt-8 text-center lg:text-left">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-body-md text-body-md text-secondary hover:text-on-secondary-container transition-colors duration-300 ml-1 border-b border-transparent hover:border-on-secondary-container pb-0.5" href="#">Create Account</a>
</p>
</div>
</div>
</div>
</body></html>
